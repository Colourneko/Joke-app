<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Joke App</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light min-vh-100 d-flex align-items-center">

<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-6 text-center">
      <div class="card shadow p-4">
        <h1 class="mb-3">Random Joke</h1>
        <p id="joke-text" class="lead mb-4">Click the button to get a joke!</p>
        <button id="joke-btn" class="btn btn-primary btn-lg">Get Joke</button>
        <button id="save-btn" class="btn btn-secondary btn-lg ms-2">Save Joke</button>
        <p id="saved-jokes-text" class="lead mb-4">Saved Jokes:</p>
      </div>
    </div>
  </div>
</div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
