<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Weather App</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light min-vh-100 d-flex align-items-center">

<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow p-4">

        <h4 class="text-center mb-3">🌤 Weather App</h4>

        <div class="input-group mb-3">
          <input type="text" id="cityInput" class="form-control" placeholder="Enter city name">
          <button id="searchBtn" class="btn btn-primary">Search</button>
        </div>

        <div id="loading" class="text-center text-muted mb-2" style="display:none;">
          Fetching weather…
        </div>
        <div id="errorMsg" class="alert alert-danger mb-2" style="display:none;"></div>

        <ul id="weatherCard" class="list-group text-start" style="display:none;">
          <li class="list-group-item d-flex justify-content-between align-items-center">
            <span class="text-muted">📍 City</span>
            <strong id="cityName">—</strong>
          </li>
          <li class="list-group-item d-flex justify-content-between align-items-center">
            <span class="text-muted">🌤 Condition</span>
            <span id="description" class="text-capitalize">—</span>
          </li>
          <li class="list-group-item d-flex justify-content-between align-items-center">
            <span class="text-muted">🌡 Temperature</span>
            <strong id="temperature">—</strong>
          </li>
          <li class="list-group-item d-flex justify-content-between align-items-center">
            <span class="text-muted">💧 Humidity</span>
            <span id="humidity">—</span>
          </li>
          <li class="list-group-item d-flex justify-content-between align-items-center">
            <span class="text-muted">💨 Wind Speed</span>
            <span id="windSpeed">—</span>
          </li>
          <li class="list-group-item d-flex justify-content-between align-items-center">
            <span class="text-muted">🔵 Pressure</span>
            <span id="pressure">—</span>
          </li>
        </ul>

      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="weatherScript.js"></script>
<script src="config.js"></script>
</body>
</html>
